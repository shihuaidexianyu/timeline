name: Package Windows App

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing release tag to upload the package to when running manually
        required: false
        type: string
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  package:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web-ui/package-lock.json

      - name: Verify version files are synchronized
        shell: pwsh
        run: .\scripts\sync-version.ps1 -CheckOnly

      - name: Verify release tag matches workspace version
        if: github.event_name == 'release' || github.event.inputs.release_tag != ''
        shell: pwsh
        run: |
          $cargoToml = Join-Path $PWD 'Cargo.toml'
          $content = Get-Content -LiteralPath $cargoToml -Raw
          if ($content -notmatch '(?ms)^\[workspace\.package\]\s+.*?^version\s*=\s*"([^"]+)"') {
            throw "Failed to parse [workspace.package].version from $cargoToml"
          }
          $workspaceVersion = $Matches[1]

          $rawTag = if ('${{ github.event_name }}' -eq 'release') { '${{ github.event.release.tag_name }}' } else { '${{ github.event.inputs.release_tag }}' }
          $normalizedTag = $rawTag -replace '^v', ''

          if ([string]::IsNullOrWhiteSpace($rawTag)) {
            throw 'Expected a release tag but none was provided.'
          }

          if ($normalizedTag -ne $workspaceVersion) {
            throw "Release tag '$rawTag' does not match workspace version '$workspaceVersion'."
          }

      - name: Install web-ui dependencies
        working-directory: apps/web-ui
        shell: pwsh
        run: npm ci

      - name: Ensure Rust toolchain is available
        shell: pwsh
        run: |
          rustup toolchain install stable-x86_64-pc-windows-msvc --profile minimal
          rustup default stable-x86_64-pc-windows-msvc

      - name: Build portable package
        shell: pwsh
        run: .\scripts\build-portable.ps1

      - name: Upload portable package
        uses: actions/upload-artifact@v4
        with:
          name: timeline-windows-portable
          path: target/portable/output/*.zip
          if-no-files-found: error

      - name: Resolve release tag
        id: release_tag
        shell: pwsh
        run: |
          $tag = ''

          if ('${{ github.event_name }}' -eq 'release') {
            $tag = '${{ github.event.release.tag_name }}'
          }
          elseif ('${{ github.ref_type }}' -eq 'tag') {
            $tag = '${{ github.ref_name }}'
          }
          elseif ('${{ github.event.inputs.release_tag }}' -ne '') {
            $tag = '${{ github.event.inputs.release_tag }}'
          }

          "tag=$tag" >> $env:GITHUB_OUTPUT

      - name: Attach portable package to GitHub Release
        if: steps.release_tag.outputs.tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          files: target/portable/output/*.zip
